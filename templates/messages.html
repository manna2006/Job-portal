<!DOCTYPE html>
<html>
<head>
<title>Inbox • CareerHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard-body">

<div class="dashboard-nav d-flex justify-content-between">
    <span>📬 Messages</span>
    <a href="/dashboard" class="btn btn-light btn-sm">Back</a>
</div>

<div class="container mt-4">

    <a href="/send-message" class="dashboard-btn">
        ✉️ New Message
    </a>

    {% for m in msgs %}
    <div class="job-card">
        <strong>From:</strong> {{ m.sender }} <br>
        <strong>Message:</strong> {{ m.message }} <br>
        <small class="text-muted">{{ m.created_at }}</small>
    </div>
    {% endfor %}

</div>

</body>
</html>
