<div class="container mt-5">
<h2>Post Job</h2>

<form method="POST">

<input name="title" class="form-control mb-2" placeholder="Job Title">
<input name="company" class="form-control mb-2" placeholder="Company">
<input name="location" class="form-control mb-2" placeholder="Location">

<textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>

<button class="btn btn-success">Post Job</button>

</form>
</div>
